name: ArgoCD Demo CI Part Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'Dockerfile'

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push
      run: |
        IMAGE_TAG=${GITHUB_SHA::7}

        docker build -t ashirqayyum/argocd-demo:$IMAGE_TAG .

        docker push ashirqayyum/argocd-demo:$IMAGE_TAG
