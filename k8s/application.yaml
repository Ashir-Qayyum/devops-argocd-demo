apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: argocd-demo
  namespace: argocd

  annotations:
    argocd-image-updater.argoproj.io/image-list: demo=ashirqayyum/argocd-demo
    argocd-image-updater.argoproj.io/demo.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/demo.allow-tags: regexp:^[a-f0-9]{7,40}$

spec:
  project: default

  source:
    repoURL: 'https://github.com/Ashir-Qayyum/devops-argocd-demo.git'
    targetRevision: HEAD
    path: k8s

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
